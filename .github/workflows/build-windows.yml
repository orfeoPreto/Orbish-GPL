name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone JUCE 8.0.6
        run: |
          git clone --depth 1 --branch 8.0.6 https://github.com/juce-framework/JUCE.git JUCE

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build Standalone
        run: cmake --build build --config Release --target Orbish_Standalone

      - name: Build VST3
        run: cmake --build build --config Release --target Orbish_VST3

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $standalone = Get-ChildItem -Path build -Recurse -Filter "Orbish.exe" | Where-Object { $_.FullName -match "Release" } | Select-Object -First 1
          if ($standalone) { Copy-Item $standalone.FullName -Destination artifacts/ }
          $vst3Dir = Get-ChildItem -Path build -Recurse -Filter "Orbish.vst3" -Directory | Select-Object -First 1
          if ($vst3Dir) { Copy-Item $vst3Dir.FullName -Destination artifacts/ -Recurse }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Orbish-Windows-x64
          path: artifacts/
